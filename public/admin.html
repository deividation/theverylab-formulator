<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>The Very Lab — Admin</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Afacad',sans-serif;background:#FBF8EE;color:#000}
  @import url('https://fonts.googleapis.com/css2?family=Afacad:wght@400;600;700&display=swap');
  header{background:#9F132D;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
  header h1{color:#fff;font-size:1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  header a{color:rgba(255,255,255,.8);font-size:.85rem;text-decoration:none}
  header button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:.4rem 1rem;border-radius:4px;cursor:pointer;font-size:.8rem}
  .container{max-width:1100px;margin:0 auto;padding:2rem}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
  .stat{background:#fff;border-radius:8px;padding:1.25rem 1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .stat-num{font-size:2rem;font-weight:700;color:#9F132D}
  .stat-label{font-size:.75rem;opacity:.5;margin-top:.25rem;text-transform:uppercase;letter-spacing:.06em}
  .filters{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
  .filters input{flex:1;min-width:200px;padding:.6rem 1rem;border:1px solid #ddd;border-radius:6px;font-size:.9rem;background:#fff}
  .filters button{padding:.6rem 1.25rem;border-radius:6px;border:none;cursor:pointer;font-size:.85rem;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .filters button.active{background:#9F132D;color:#fff;font-weight:700}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  th{padding:.85rem 1rem;text-align:left;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;opacity:.5;font-weight:600;background:#FBF8EE;border-bottom:2px solid #F6D4D8}
  td{padding:.85rem 1rem;border-bottom:1px solid #F6D4D8;font-size:.9rem}
  tr:nth-child(even) td{background:#fafafa}
  .badge{border-radius:12px;padding:.2rem .6rem;font-size:.75rem}
  .badge.deal{background:#9F132D;color:#fff}
  .badge.new{background:#F6D4D8;color:#9F132D}
  .loading{text-align:center;padding:3rem;opacity:.4}
</style>
</head>
<body>
<header>
  <h1>The Very Lab — Admin</h1>
  <div style="display:flex;gap:1rem;align-items:center">
    <a href="/">← App</a>
    <button onclick="loadLeads()">Refresh</button>
  </div>
</header>
<div class="container">
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-num" id="total">—</div><div class="stat-label">Total Leads</div></div>
    <div class="stat"><div class="stat-num" id="withDeals">—</div><div class="stat-label">With Deals</div></div>
    <div class="stat"><div class="stat-num" id="newLeads">—</div><div class="stat-label">New</div></div>
  </div>
  <div class="filters">
    <input type="text" id="search" placeholder="Search name, phone, email..." oninput="render()"/>
    <button onclick="setFilter('all')" id="f-all" class="active">All</button>
    <button onclick="setFilter('deals')" id="f-deals">Has Deal</button>
    <button onclick="setFilter('no-deals')" id="f-no-deals">New</button>
  </div>
  <div id="table-wrap"><div class="loading">Loading leads...</div></div>
</div>
<script>
const TOKEN = '331af678135f52599f72a25beb952fc8f1e31a00';
let leads = [], filter = 'all';

async function loadLeads() {
  document.getElementById('table-wrap').innerHTML = '<div class="loading">Loading leads...</div>';
  const r = await fetch('https://api.pipedrive.com/v1/persons?api_token=' + TOKEN + '&limit=100&sort=add_time+DESC');
  const d = await r.json();
  const persons = d.data || [];
  leads = await Promise.all(persons.map(async p => {
    const dr = await fetch('https://api.pipedrive.com/v1/persons/' + p.id + '/deals?api_token=' + TOKEN);
    const dd = await dr.json();
    return {...p, deals: dd.data || []};
  }));
  document.getElementById('total').textContent = leads.length;
  document.getElementById('withDeals').textContent = leads.filter(l => l.deals.length > 0).length;
  document.getElementById('newLeads').textContent = leads.filter(l => l.deals.length === 0).length;
  render();
}

function setFilter(f) {
  filter = f;
  ['all','deals','no-deals'].forEach(x => document.getElementById('f-'+x).classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = leads.filter(l => {
    const name = (l.name||'').toLowerCase();
    const phone = l.phone?.[0]?.value || '';
    const email = l.email?.[0]?.value?.toLowerCase() || '';
    const match = !search || name.includes(search) || phone.includes(search) || email.includes(search);
    if (filter === 'deals') return match && l.deals.length > 0;
    if (filter === 'no-deals') return match && l.deals.length === 0;
    return match;
  });
  if (!filtered.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="loading">No leads found</div>';
    return;
  }
  const rows = filtered.map((l,i) => `
    <tr>
      <td style="font-weight:600">${l.name||'—'}</td>
      <td style="opacity:.7">${l.phone?.[0]?.value||'—'}</td>
      <td style="opacity:.7">${l.email?.[0]?.value||'—'}</td>
      <td style="opacity:.7">${l.org_name||'—'}</td>
      <td>${l.deals.length > 0 ? '<span class="badge deal">'+l.deals.length+' deal'+(l.deals.length>1?'s':'')+'</span>' : '<span class="badge new">New</span>'}</td>
      <td style="opacity:.5;font-size:.8rem">${l.add_time ? new Date(l.add_time).toLocaleDateString('lt-LT') : '—'}</td>
    </tr>
  `).join('');
  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Company</th><th>Deals</th><th>Added</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

loadLeads();
</script>
</body>
</html>
